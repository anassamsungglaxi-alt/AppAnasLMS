<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طلاب العلم - المنصة التعليمية</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root { 
            --primary: #00d2ff; 
            --secondary: #ff9d00; 
            --card-bg: rgba(255, 255, 255, 0.1);
            --text: #ffffff; 
            --plyr-color-main: var(--primary); 
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 20px;
            min-height: 100vh;
            color: white;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #00d2ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-box { 
            max-width: 450px; 
            margin: 60px auto; 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }

        .container { max-width: 1000px; margin: auto; }

        input, select { 
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.1); 
            color: white; 
            box-sizing: border-box; 
            transition: 0.3s;
            font-size: 1rem;
        }

        input:focus { 
            outline: none; 
            background: rgba(255,255,255,0.2);
            border-color: var(--primary); 
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); 
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(45deg, var(--primary), #0072ff); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1rem;
            transition: 0.4s; 
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3);
            margin-top: 10px;
        }

        button:hover { 
            transform: scale(1.03); 
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.6); 
        }

        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 25px; 
            margin-top: 40px; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border-radius: 25px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 20px; 
            transition: 0.4s ease;
        }

        .card:hover { 
            transform: translateY(-10px); 
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .locked-overlay { 
            background: rgba(0,0,0,0.8); 
            height: 200px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column; 
            text-align: center; 
            border-radius: 15px; 
            padding: 20px;
        }

        .wa-btn { 
            background: #25d366; 
            text-decoration: none; 
            color: white; 
            padding: 12px 24px; 
            border-radius: 10px; 
            display: inline-block; 
            margin-top: 15px; 
            font-weight: bold;
        }

        .header-main {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 10px;
        }

        /* نافذة الإيداع */
        #depositModal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        #authSection, #mainSection { display: none; }
    </style>
</head>
<body>

<!-- شاشة الدخول والتسجيل -->
<div id="authSection" class="auth-box">
    <h3> مطور المنصه ( أنس مصطفى فرج ) </h3>
    <h2 id="authTitle">👋 تسجيل الدخول </h2>
    <p id="authDesc">أهلاً بك! يرجى إدخال بياناتك للمتابعة.</p>
    <input type="text" id="userName" placeholder="الاسم بالكامل">
    <input type="text" id="userPhone" placeholder="رقم الهاتف ">
    <input type="password" id="userPass" placeholder="كلمة السر">
    <button id="authBtn" onclick="handleAuth()">اكتشف دروسك</button>
    <a href="#" onclick="toggleAuth()" style="color: rgba(255,255,255,0.7); display: block; margin-top: 20px; text-decoration: none; font-size: 0.9rem;">إنشاء حساب جديد</a>
    <a href="https://wa.me/201278115809" class="wa-btn">دعم فني</a>
</div>

<!-- الشاشة الرئيسية -->
<div id="mainSection" class="container">
    <div class="header-main">
        <h2 style="margin:0; color:#fff;">📚 دروسي</h2>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span id="balanceDisplay" style="background: var(--secondary); padding: 5px 15px; border-radius: 10px; font-weight: bold;">جاري التحميل...</span>
            <button onclick="openDepositModal()" style="width: auto; margin:0; padding: 10px 15px; font-size: 0.8rem; background: #25d366;">إيداع</button>
            <button onclick="logout()" style="width: auto; margin:0; padding: 10px 15px; background: rgba(255,255,255,0.2); font-size: 0.8rem; box-shadow: none;">خروج</button>
        </div>
    </div>
    <div class="video-grid" id="videoGrid">جاري مزامنة المحتوى...</div>
</div>

<!-- نافذة الإيداع -->
<div id="depositModal">
    <div class="auth-box" style="margin:0; width: 90%; max-width: 400px;">
        <h2>💰 شحن المحفظة</h2>
        <p style="font-size: 0.9rem;">حول المبلغ على الرقم: <br><strong style="color:var(--primary)">01278115809</strong></p>
        <input type="number" id="depAmount" placeholder="المبلغ المراد إيداعه">
        <input type="text" id="senderPhone" placeholder="رقم المحفظة المرسل منها">
        <label style="display:block; margin-top:10px; font-size:0.8rem">ارفاق صورة العملية (سكرين شوت):</label>
        <input type="file" id="screenshotInput" accept="image/*">
        <button onclick="sendDepositRequest()">إرسال طلب الشحن</button>
        <button onclick="closeDepositModal()" style="background: #666; margin-top: 5px;">إغلاق</button>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, getDocs, addDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCXnqZnuUQr-9NALizGwvhMPsj649VGoJs",
    authDomain: "anas-lms.firebaseapp.com",
    projectId: "anas-lms",
    storageBucket: "anas-lms.firebasestorage.app",
    messagingSenderId: "410918913877",
    appId: "1:410918913877:web:3eb877fb6e21289eb791dc"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let isLogin = true;
  let currentUser = JSON.parse(localStorage.getItem('anasUser'));

  if(currentUser) {
    showMain();
  } else {
    document.getElementById('authSection').style.display = 'block';
  }

  window.toggleAuth = () => {
    isLogin = !isLogin;
    document.getElementById('authTitle').innerText = isLogin ? "👋 تسجيل الدخول" : "🆕 إنشاء حساب جديد";
    document.getElementById('authBtn').innerText = isLogin ? "اكتشف دروسك" : "بدء الرحلة التعليمية";
    document.getElementById('authDesc').innerText = isLogin ? "أهلاً بك! يرجى إدخال بياناتك للمتابعة." : "سجل الآن لتصل إلى أقوى المحتويات التعليمية.";
  };

  window.handleAuth = async () => {
    const name = document.getElementById('userName').value;
    const phone = document.getElementById('userPhone').value;
    const pass = document.getElementById('userPass').value;

    if(!phone || !pass) return alert("اكمل البيانات!");

    if(!isLogin) {
        const checkUser = await getDoc(doc(db, "users", phone));
        if (checkUser.exists()) return alert("هذا الرقم مسجل بالفعل!");

        await setDoc(doc(db, "users", phone), { 
            name, phone, pass, 
            balance: 0, // الرصيد الافتراضي
            permissions: [] 
        });
        alert("تم إنشاء الحساب! سجل دخولك الآن.");
        toggleAuth();
        return;
    }

    const userSnap = await getDoc(doc(db, "users", phone));
    if(userSnap.exists() && userSnap.data().pass === pass) {
        localStorage.setItem('anasUser', JSON.stringify(userSnap.data()));
        location.reload();
    } else {
        alert("بيانات خاطئة!");
    }
  };

  async function showMain() {
    document.getElementById('authSection').style.display = 'none';
    document.getElementById('mainSection').style.display = 'block';
    updateBalance();
    loadVideos();
  }

  async function updateBalance() {
    const userDoc = await getDoc(doc(db, "users", currentUser.phone));
    if(userDoc.exists()) {
        const bal = userDoc.data().balance || 0;
        document.getElementById('balanceDisplay').innerText = `رصيدك: ${bal} ج.م`;
    }
  }

  window.openDepositModal = () => document.getElementById('depositModal').style.display = 'flex';
  window.closeDepositModal = () => document.getElementById('depositModal').style.display = 'none';

  window.sendDepositRequest = async () => {
    const amount = document.getElementById('depAmount').value;
    const sender = document.getElementById('senderPhone').value;
    const file = document.getElementById('screenshotInput').files[0];

    if(!amount || !sender || !file) return alert("برجاء ملئ كافة البيانات وارفاق الصورة");

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
        await addDoc(collection(db, "deposits"), {
            userId: currentUser.phone,
            userName: currentUser.name,
            amount: parseInt(amount),
            senderPhone: sender,
            screenshot: reader.result, // النص المحول من الصورة
            status: "pending",
            date: new Date().toLocaleString('ar-EG')
        });
        alert("تم إرسال الطلب، سيتم مراجعته وإضافة الرصيد قريباً.");
        closeDepositModal();
    };
  };

  window.buyVideo = async (vidId, price) => {
    const userRef = doc(db, "users", currentUser.phone);
    const userSnap = await getDoc(userRef);
    const currentBal = userSnap.data().balance || 0;

    if(currentBal >= price) {
        if(confirm(`هل تريد خصم ${price} ج.م من رصيدك لفتح هذا الدرس؟`)) {
            await updateDoc(userRef, {
                balance: currentBal - price,
                permissions: arrayUnion(vidId)
            });
            alert("تم الشراء بنجاح! استمتع بالمشاهدة.");
            location.reload();
        }
    } else {
        alert("رصيدك غير كافٍ. برجاء شحن المحفظة.");
        openDepositModal();
    }
  };

  async function loadVideos() {
    const querySnapshot = await getDocs(collection(db, "videos"));
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = "";
    
    const userUpdate = await getDoc(doc(db, "users", currentUser.phone));
    const myPermissions = userUpdate.data().permissions || [];

    querySnapshot.forEach((vDoc) => {
      const vid = vDoc.data();
      const vidId = vDoc.id;
      const isPaid = vid.price > 0;
      const hasAccess = myPermissions.includes(vidId);
      const youtubeId = vid.videoUrl.includes('embed/') ? vid.videoUrl.split('embed/')[1].split('?')[0] : vid.videoUrl;

      let content = "";
      if (isPaid && !hasAccess) {
        content = `
          <div class="locked-overlay">
            <span>🔒 درس مدفوع (${vid.price} ج.م)</span>
            <button onclick="buyVideo('${vidId}', ${vid.price})" style="background:var(--secondary); width:auto; padding:10px 20px;">اشترِ الآن من رصيدك</button>
            <a href="https://wa.me/201278115809?text=تفعيل الدرس: ${vid.title}" style="color:#ccc; font-size:0.7rem; margin-top:10px">أو تفعيل عبر واتساب</a>
          </div>`;
      } else {
        content = `<div class="plyr__video-embed" id="player-${vidId}"><iframe src="https://www.youtube.com/embed/${youtubeId}?origin=${window.location.origin}&iv_load_policy=3&modestbranding=1&playsinline=1&showinfo=0&rel=0&enablejsapi=1" allowfullscreen allowtransparency allow="autoplay"></iframe></div>`;
      }

      grid.innerHTML += `<div class="card"><h3>${vid.title}</h3>${content}</div>`;
      
      if (!isPaid || hasAccess) {
          setTimeout(() => { new Plyr(`#player-${vidId}`); }, 100);
      }
    });
  }

  window.logout = () => { localStorage.clear(); location.reload(); };
</script>
</body>
</html>
