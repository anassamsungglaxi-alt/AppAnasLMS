<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب - منصة أنس</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a2e; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #16213e; padding: 30px; border-radius: 15px; width: 320px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; outline: none; }
        button { width: 100%; padding: 10px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        p { font-size: 13px; color: #aaa; }
        .login-link { margin-top: 15px; display: block; color: #4caf50; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="box">
    <h2>إنشاء حساب جديد 🚀</h2>
    <p>كلمة السر لازم تكون 6 أرقام أو أكتر</p>
    <input type="text" id="userName" placeholder="اسمك بالكامل">
    <input type="text" id="userPhone" placeholder="رقم الموبايل">
    <input type="password" id="userPass" placeholder="كلمة السر">
    <button onclick="signUp()">إنشاء الحساب</button>
    <a href="login.html" class="login-link">عندك حساب؟ سجل دخول</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCXnqZnuUQr-9NALizGwvhMPsj649VGoJs",
    authDomain: "anas-lms.firebaseapp.com",
    projectId: "anas-lms",
    storageBucket: "anas-lms.firebasestorage.app",
    messagingSenderId: "410918913877",
    appId: "1:410918913877:web:3eb877fb6e21289eb791dc"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.signUp = async () => {
    const name = document.getElementById('userName').value;
    const phone = document.getElementById('userPhone').value;
    const pass = document.getElementById('userPass').value;

    if(phone.length < 11 || pass.length < 6) { alert("اتأكد من البيانات (الرقم 11 والباسورد 6)"); return; }

    try {
        const email = phone + "@anas-platform.com"; 
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
            fullName: name,
            phone: phone,
            uid: user.uid,
            isAllowed: [] 
        });

        alert("تم الإنشاء بنجاح!");
        window.location.href = "login.html";
    } catch (e) { alert("خطأ: " + e.message); }
  }
</script>
</body>
</html>
